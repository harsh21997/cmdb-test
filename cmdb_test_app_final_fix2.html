rce is scheduled to update server records weekly. However, due to an integration issue, the high-priority data source stops updating the records. Which configuration can be used to allow a lower-priority data source to update records after a specified period of inactivity from the higher-priority source?", "options": ["A. Data Refresh Rules", "B. Health Inclusion Rules", "C. Identification Rules", "D. Reconciliation Rules"], "answer": "A. Data Refresh Rules", "multi": false}, {"q": "A CMDB Administrator wants to leverage the Staleness metric from the CMDB Health Dashboard - Correctness Scorecard. What is the default duration of this metric?", "options": ["A. 24 hours", "B. 30 days", "C. 7 days", "D. 60 days"], "answer": "B. 30 days", "multi": false}, {"q": "Drag and drop the CMDB Health Dashboard metric to the description. (Choose 2 Options)", "options": [], "answer": "As matched above", "multi": true}, {"q": "The CMDB Configuration Management team has successfully developed a healthy and trusted CMDB. How will these improvements enhance the change management process? (Choose 2)", "options": ["A. Automatically schedules and deploys changes without human review or approval", "B. Provides insight into the potential impact of the change", "C. Ensures that no changes result in service downtime", "D. Enables auto population of the assignment group field to dynamically route changes"], "answer": "B, D", "multi": true}, {"q": "ServiceNow provides a suite of CMDB management tools. Drag and drop the design architecture to its management tool.", "options": [], "answer": "As matched above", "multi": false}, {"q": "A CMDB Administrator has a report in ServiceNow that lists all CMDB Services that do not have an owner and wants to use a ServiceNow Playbook. What Governance process play can prevent this from recurring?", "options": ["A. Make the field Managed by mandatory on all CIs", "B. Make the field Owned by mandatory", "C. Set a default value on the Service Owner field so tha let test = [];

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function generateTest() {
  test = shuffle([...QUESTIONS]).map(q => {
    return {...q, options: shuffle([...q.options])};
  });

  const form = document.getElementById("quiz");
  form.innerHTML = "";

  test.forEach((q, i) => {
    let div = document.createElement("div");
    div.className = "card";

    let inputType = q.multi ? "checkbox" : "radio";

    div.innerHTML = `<b>${i+1}. ${q.q}</b><br>` +
      q.options.map(opt =>
        `<label><input type="${inputType}" name="q${i}" value="${opt}"> ${opt}</label><br>`
      ).join("");

    form.appendChild(div);
  });
}

function getLetter(opt) {
  return opt.trim()[0];
}

function submitTest() {
  let correct = 0;
  let wrongHTML = "";

  test.forEach((q,i) => {
    let selected = Array.from(document.querySelectorAll(`input[name=q${i}]:checked`))
      .map(e=>getLetter(e.value));

    let correctAnswers = q.answer.split(",").map(a=>a.trim()[0]);

    let isCorrect = JSON.stringify(selected.sort()) === JSON.stringify(correctAnswers.sort());

    if(isCorrect) correct++;
    else {
      wrongHTML += `<div class="card">
        <b>${q.q}</b><br>
        ✔ Correct: ${q.answer}<br>
        ✖ Your Answer: ${selected.join(", ") || "Not answered"}
      </div>`;
    }
  });

  document.getElementById("result").innerHTML = `
    <h3>Correct: ${correct}</h3>
    <h3>Wrong: ${test.length - correct}</h3>
    ${wrongHTML}
  `;
}
</script>
